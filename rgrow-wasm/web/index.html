<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rgrow tile assembly simulator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>rgrow</h1>
      </header>

      <main>
        <section id="canvas-pane">
          <canvas id="sim"></canvas>
          <div id="stats">Loading…</div>
          <div id="tile-info" class="tile-info empty">Hover the canvas to inspect a tile.</div>
          <div id="tileset-panel" class="tileset-panel" hidden>
            <div class="tileset-header">
              <h3>Tileset</h3>
              <span id="tileset-count" class="muted"></span>
            </div>
            <div class="tileset-table-wrap">
              <table id="tileset-table">
                <thead>
                  <tr>
                    <th>Tile</th>
                    <th>#</th>
                    <th>Name</th>
                    <th class="col-conc">Conc.</th>
                    <th class="col-glue">N</th>
                    <th class="col-glue">E</th>
                    <th class="col-glue">S</th>
                    <th class="col-glue">W</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>

          <div id="glue-panel" class="tileset-panel" hidden>
            <div class="tileset-header">
              <h3>Glue interactions</h3>
              <span id="glue-count" class="muted"></span>
            </div>
            <div class="tileset-table-wrap">
              <table id="glue-table">
                <thead>
                  <tr>
                    <th>Pair</th>
                    <th id="glue-th-dg">Strength</th>
                    <th id="glue-th-ds" class="col-ds">ΔS</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </section>

        <aside id="controls">
          <div class="control-block">
            <h2>Tileset</h2>
            <label for="example-select">Examples:</label>
            <select id="example-select">
              <option value="">— pick one —</option>
              <option value="sierpinski.yaml">Sierpinski</option>
              <option value="barish-perfect.yaml">Barish (perfect)</option>
              <option value="sdc1d-bitcopy.json">SDC1D Bitcopy</option>
              <option value="sdc2d-position.json">SDC2DSquare Bitcopy</option>
              <option value="Rule110.tiles">Rule 110 (xgrow)</option>
              <option value="sierpinski2x2-importfile.tiles">Sierpinski 2x2 + importfile (xgrow)</option>
            </select>
            <label for="file-input">Or load from file:</label>
            <input id="file-input" type="file" accept=".yaml,.yml,.json,.tiles" />
            <details>
              <summary>Or paste YAML/JSON</summary>
              <textarea id="paste-input" rows="6" placeholder="Paste tileset here, then click Load"></textarea>
              <button id="paste-load">Load pasted text</button>
            </details>
          </div>

          <div class="control-block" id="importfile-block" hidden>
            <h2>Importfile</h2>
            <p id="importfile-message"></p>
            <label for="importfile-input">Load <code id="importfile-name"></code>:</label>
            <input id="importfile-input" type="file" accept=".seed,.flake,.txt" />
            <label for="importfile-offset-i">Offset i (rows):</label>
            <input id="importfile-offset-i" type="number" value="0" step="1" />
            <label for="importfile-offset-j">Offset j (cols):</label>
            <input id="importfile-offset-j" type="number" value="0" step="1" />
            <p id="importfile-status" class="muted"></p>
          </div>

          <div class="control-block">
            <h2>Run</h2>
            <button id="pause" disabled>Pause</button>
            <button id="step" disabled>Step (events)</button>
            <button id="reset" disabled>Reload</button>
            <label for="events-per-step">Events/step:</label>
            <input id="events-per-step" type="number" value="10000" min="1" />
            <label for="step-budget-ms">Per-frame budget (ms):</label>
            <input id="step-budget-ms" type="number" value="8" min="1" max="200" step="1" />
            <label for="timescale">Timescale (sim s / real s):</label>
            <input id="timescale" type="number" placeholder="unlimited" min="0" step="any" />
            <label for="max-events-per-sec">Max events/sec:</label>
            <input id="max-events-per-sec" type="number" placeholder="unlimited" min="0" step="1" />
            <label for="scale">Tile size (px):</label>
            <input id="scale" type="range" min="2" max="24" value="8" />
            <span id="scale-value">8</span>
            <label><input id="show-mismatches" type="checkbox" checked /> Show mismatches</label>
          </div>

          <div class="control-block">
            <h2 id="parameters-heading">Parameters</h2>
            <div id="parameter-list"><em>Load a tileset to see parameters.</em></div>
          </div>
        </aside>
      </main>

      <footer>
        <p><a href="https://codeberg.org/cge/rgrow">https://codeberg.org/cge/rgrow</a></p>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
