# vim: ft=yaml
# mode: yaml
#
# The Sierpinski example, in the aTAM (Abstract Tile Assembly Model).
# Same tile set as sierpinski.yaml, but grown deterministically with a
# binding threshold (tau) rather than with kinetic rates.

# bonds is a list of bond types. Bonds not listed here are assumed to be
# strength 1.
bonds:
    - { name: B, strength: 2 }
    - { name: v0, strength: 1 }


# tiles is a list of tile types. Fields: name, edges, color, stoic.
tiles:
    - { name: corner, edges: [ B, 0, 0, B ], color: red, stoic: 0  }
    - { name: topboundary, edges: [B, 0, B, v1], color: magenta }
    - { name: leftboundary, edges: [v1, B, 0, B], color: purple }
    - { edges: [ v0, v0, v0, v0 ], color: blue3 }
    - { edges: [ v0, v1, v1, v0 ], color: green }
    - { edges: [ v1, v0, v1, v1 ], color: yellow }
    - { edges: [ v1, v1, v0, v1 ], color: tan }

# xgrowargs - arguments for the simulation. The aTAM attaches a tile wherever
# the total strength of matching bonds reaches the threshold tau. With tau=2,
# the boundary tiles attach via their strength-2 B bonds and each computation
# tile attaches via its two strength-1 input bonds.
xgrowargs:
    size: 128
    seed:
    - [120,120,1]
    update_rate: 1
    threshold: 2
    canvas_type: Square
    model: ATAM
    fission: 'keep-seeded'
