name: Docs

# Builds the zensical/mkdocs site and deploys it directly to git-pages, which
# Codeberg Pages serves at <user>.codeberg.page/<repo>. Also stages the
# coverage-site artifact produced by the CI workflow under /coverage/, so
# https://<user>.codeberg.page/<repo>/coverage/ serves the latest combined
# Rust + Python coverage report plus a shields.io endpoint badge.
#
# Runner expectation:
#   - `docker` Linux runner.
#
# Secrets used:
#   - forge.token : auto-provided by Forgejo and accepted by git-pages.
#
# Caching: see comment in ci.yml. The runner's config.yaml must allow the
# `rgrow-*` named volumes via `container.valid_volumes`.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'examples/**/*.ipynb'
      - 'rgrow-python/rgrow/**'
      - 'rgrow-rust/src/**'
      - 'rgrow-wasm/**'
      - '.forgejo/workflows/docs.yml'
  # Re-run after CI completes successfully on main so the freshly-built
  # coverage-site artifact is published alongside the docs.
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs:
    # When triggered by workflow_run, only deploy if the CI run actually
    # succeeded. Other triggers (push, workflow_dispatch) always run.
    if: forge.event_name != 'workflow_run' || forge.event.workflow_run.conclusion == 'success'
    runs-on: docker
    container:
      image: docker.io/catthehacker/ubuntu:act-22.04
      volumes:
        - rgrow-cargo:/cache/cargo
        - rgrow-cargo-target:/cache/cargo-target
        - rgrow-uv:/cache/uv
    env:
      CARGO_HOME: /cache/cargo
      CARGO_TARGET_DIR: /cache/cargo-target
      UV_CACHE_DIR: /cache/uv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: https://github.com/astral-sh/setup-uv@v7
      - uses: https://github.com/dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: Install dependencies
        run: |
          uv venv
          uv pip install maturin zensical "mkdocstrings[python]" jupyter nbconvert
      - name: Build and install rgrow
        run: |
          source .venv/bin/activate
          maturin develop --manifest-path rgrow-python/Cargo.toml
      - name: Convert notebooks
        run: |
          source .venv/bin/activate
          bash docs/convert_notebooks.sh
      - name: Build docs
        run: |
          source .venv/bin/activate
          zensical build --clean
      - name: Install wasm-pack
        run: |
          curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - name: Install binaryen (wasm-opt)
        # Don't use apt's binaryen on Ubuntu 22.04 — it ships v99, which
        # has a table-reorder bug that mis-rewrites the externref table
        # export produced by recent wasm-bindgen (the export ends up
        # pointing at the funcref table instead of the externref table).
        # Symptom in the browser at first sim load:
        #   WebAssembly.Table.grow(): failed to grow table by 4
        # at __wbindgen_init_externref_table. Pin a recent upstream
        # binaryen release instead.
        run: |
          BINARYEN_VERSION=122
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" \
            | tar xz -C /opt
          echo "/opt/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"
          "/opt/binaryen-version_${BINARYEN_VERSION}/bin/wasm-opt" --version
      - name: Build rgrow-wasm app
        run: |
          wasm-pack build rgrow-wasm \
            --out-dir web/pkg \
            --target web --release
      - name: Add rgrow-wasm app to Pages site
        run: |
          mkdir -p site/app
          cp -a rgrow-wasm/web/. site/app/
      - name: Download coverage report artifact
        # Pulls the `coverage-site` artifact produced by the CI workflow's
        # `coverage` job. When this workflow is triggered by `workflow_run`
        # (CI completion), `run-id` points at that CI run; for `push` /
        # `workflow_dispatch` we fall back to the latest run on the
        # branch. Marked best-effort so the docs site still deploys on the
        # first run before any CI coverage artifact exists.
        uses: https://code.forgejo.org/forgejo/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-site
          path: site/coverage
          run-id: ${{ forge.event.workflow_run.id }}
          repository: ${{ forge.repository }}
          token: ${{ forge.token }}
      - name: Deploy to Codeberg Pages
        uses: https://codeberg.org/git-pages/action@v2
        with:
          site: "https://${{ forge.repository_owner }}.codeberg.page/rgrow/"
          token: ${{ forge.token }}
          source: site/
