name: WASM

# Builds the rgrow-wasm browser demo for validation. Deployment happens in
# docs.yml, which copies this static app into the Codeberg Pages site at /app/
# alongside the documentation.
#
# Runner expectation:
#   - `docker` Linux runner. Same shape as ci.yml / docs.yml.
#
on:
  push:
    branches: [main]
    paths:
      - 'rgrow-rust/**'
      - 'rgrow-wasm/**'
      - '.forgejo/workflows/wasm.yml'
  pull_request:
    paths:
      - 'rgrow-rust/**'
      - 'rgrow-wasm/**'
      - '.forgejo/workflows/wasm.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wasm
  cancel-in-progress: true

jobs:
  build:
    runs-on: docker
    container:
      image: docker.io/catthehacker/ubuntu:act-22.04
      volumes:
        - rgrow-cargo:/cache/cargo
        - rgrow-cargo-target:/cache/cargo-target
    env:
      CARGO_HOME: /cache/cargo
      CARGO_TARGET_DIR: /cache/cargo-target
    steps:
      - uses: actions/checkout@v4
      - uses: https://github.com/dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: |
          curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - name: Install binaryen (wasm-opt)
        # Don't use apt's binaryen on Ubuntu 22.04 — it ships v99, which
        # has a table-reorder bug that mis-rewrites the externref table
        # export produced by recent wasm-bindgen (the export ends up
        # pointing at the funcref table instead of the externref table).
        # Symptom in the browser at first sim load:
        #   WebAssembly.Table.grow(): failed to grow table by 4
        # at __wbindgen_init_externref_table. Pin a recent upstream
        # binaryen release instead.
        run: |
          BINARYEN_VERSION=122
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" \
            | tar xz -C /opt
          echo "/opt/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"
          "/opt/binaryen-version_${BINARYEN_VERSION}/bin/wasm-opt" --version
      - name: Build rgrow-wasm (release)
        run: |
          wasm-pack build rgrow-wasm \
            --out-dir web/pkg \
            --target web --release
      - name: Verify wasm size
        run: |
          ls -la rgrow-wasm/web/pkg/
          gzipped=$(gzip -c rgrow-wasm/web/pkg/rgrow_wasm_bg.wasm | wc -c)
          echo "Gzipped wasm: ${gzipped} bytes"
          # Soft budget: warn over 1 MB, fail over 2 MB
          if [ "$gzipped" -gt 2000000 ]; then
            echo "::error::Gzipped wasm exceeds 2 MB budget (${gzipped} bytes)"
            exit 1
          elif [ "$gzipped" -gt 1000000 ]; then
            echo "::warning::Gzipped wasm exceeds 1 MB soft budget (${gzipped} bytes)"
          fi
      - name: Upload artifact
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: wasm-demo
          path: rgrow-wasm/web/
